<!DOCTYPE html>
<html>
<body>
    <h1>Galeri Foto</h1>
    <div id="gallery"></div>

    <script>
        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 148; i++) {
            const img = document.createElement('img');
            // Menyesuaikan format nama file Anda
            img.src = "nv_join_project_img%20(" + i + ").jpg";
            img.style.width = "100%";
            img.style.marginBottom = "10px";
            gallery.appendChild(img);
        }
    </script>
</body>
</html>
