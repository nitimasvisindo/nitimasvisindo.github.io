<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] p-10 text-white">
    <h1 class="text-4xl font-bold mb-10">Galeri Foto Proyek</h1>
    <div id="galeri-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <script>
        const container = document.getElementById('galeri-container');
        for (let i = 1; i <= 148; i++) {
            const img = document.createElement('img');
            // Menyesuaikan dengan nama file: ada spasi sebelum (i)
            img.src = `nv_join_project_img (${i}).jpg`;
            img.className = "w-full h-64 object-cover rounded shadow-lg";
            img.onerror = function() { this.style.display = 'none'; };
            container.appendChild(img);
        }
    </script>
</body>
</html>
