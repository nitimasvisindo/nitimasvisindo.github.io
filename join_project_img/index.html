<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto Proyek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS untuk Modal */
        .modal { display: none; position: fixed; z-index: 50; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 80vh; object-fit: contain; }
    </style>
</head>
<body class="bg-[#121212] p-6 md:p-10 text-white">
    
    <div class="mb-8">
        <h1 class="text-4xl font-bold">Galeri Foto Proyek</h1>
        <p class="text-[#D4AF37] font-semibold mt-2 text-lg">💡 Klik pada gambar untuk melihat ukuran besar</p>
    </div>

    <div id="galeri-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <div id="modal" class="modal" onclick="this.classList.remove('active')">
        <img id="modal-img" src="" alt="Zoom">
    </div>

    <script>
        const container = document.getElementById('galeri-container');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');

        for (let i = 1; i <= 148; i++) {
            const fileName = `nv_join_project_img (${i}).jpg`;
            const img = document.createElement('img');
            img.src = fileName;
            img.className = "w-full h-48 object-cover rounded shadow-lg cursor-pointer hover:scale-105 transition-transform duration-300";
            img.onclick = function() {
                modalImg.src = this.src;
                modal.classList.add('active');
            };
            img.onerror = function() { this.style.display = 'none'; };
            container.appendChild(img);
        }
    </script>
</body>
</html>
