<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #f4f4f4; margin: 0; }
        
        /* Layout Grid 2 Kolom agar foto tampil besar di HP */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            padding: 10px;
        }
        
        .img-thumb { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* Kotak persegi agar rapi */
            background: #ddd; 
            cursor: pointer; 
            border-radius: 8px; 
            object-fit: cover; /* Foto memenuhi kotak tanpa gepeng */
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* Gaya Popup (Modal) */
        #modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
        }
        #modal img { 
            max-width: 95%; 
            max-height: 85%; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #close-btn { 
            position: absolute; 
            top: 20px; right: 20px; 
            color: white; 
            font-size: 45px; 
            cursor: pointer; 
            line-height: 1;
        }
    </style>
</head>
<body>

        <h1>Galeri Foto</h1>
    <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">Klik foto untuk memperbesar</p>
    
    <div class="grid" id="image-gallery"></div>


    <div id="modal">
        <span id="close-btn">&times;</span>
        <img id="modal-img" src="" alt="Foto Besar">
    </div>

    <script>
        const totalImages = 148; // Sesuai jumlah foto Anda
        const gallery = document.getElementById('image-gallery');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');

        for (let i = 1; i <= totalImages; i++) {
            // Nama file sesuai format Anda
            let fileName = "nv_join_project_img (" + i + ").jpg";
            
            let img = document.createElement('img');
            img.className = 'img-thumb';
            img.src = encodeURIComponent(fileName); // Otomatis urus spasi dan kurung
            
            // Fungsi klik untuk memperbesar
            img.onclick = () => {
                modal.style.display = 'flex';
                modalImg.src = img.src;
            };
            
            gallery.appendChild(img);
        }

        // Fungsi klik tombol tutup
        document.getElementById('close-btn').onclick = () => {
            modal.style.display = 'none';
        };

        // Tutup popup jika area hitam diklik
        modal.onclick = (e) => {
            if(e.target == modal) {
                modal.style.display = 'none';
            }
        };
    </script>

</body>
</html>
