<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Video</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .video-container { margin-bottom: 30px; }
        video { max-width: 100%; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Koleksi Video</h1>
    <div id="video-gallery"></div>

    <script>
        // Cukup ubah angka ini jika jumlah video bertambah
        const totalVideo = 19; 
        const gallery = document.getElementById('video-gallery');

        for (let i = 1; i <= totalVideo; i++) {
            // Nama file dasar
            let fileName = "nv_join_project_vid (" + i + ").mp4";
            
            let container = document.createElement('div');
            container.className = 'video-container';
            
            let video = document.createElement('video');
            video.src = encodeURIComponent(fileName); // Menangani spasi & tanda kurung otomatis
            video.controls = true;
            video.preload = "metadata"; // Agar halaman lebih ringan saat dibuka
            
            container.appendChild(video);
            gallery.appendChild(container);
        }
    </script>
</body>
</html>
