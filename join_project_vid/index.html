<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Video</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #f4f4f4; }
        /* Grid layout agar rapi */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .video-thumb { width: 100%; aspect-ratio: 16/9; background: #000; cursor: pointer; border-radius: 5px; }
        
        /* Gaya Popup (Modal) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #modal video { width: 90%; max-width: 800px; border-radius: 10px; }
        #close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Galeri Video</h1>
    <div class="grid" id="video-gallery"></div>

    <div id="modal"><span id="close-btn">&times;</span><video id="modal-video" controls></video></div>

    <script>
        const totalVideo = 19; 
        const gallery = document.getElementById('video-gallery');
        const modal = document.getElementById('modal');
        const modalVideo = document.getElementById('modal-video');

        for (let i = 1; i <= totalVideo; i++) {
            let fileName = "nv_join_project_vid (" + i + ").mp4";
            let thumb = document.createElement('video');
            thumb.className = 'video-thumb';
            thumb.src = encodeURIComponent(fileName);
            thumb.onclick = () => { modal.style.display = 'flex'; modalVideo.src = thumb.src; modalVideo.play(); };
            gallery.appendChild(thumb);
        }

        document.getElementById('close-btn').onclick = () => { modal.style.display = 'none'; modalVideo.pause(); };
    </script>
</body>
</html>
